<!DOCTYPE html>
<html lang="uz">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐾 Hayvonlar O'yini - Juftlashtirish</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

        * {
            user-select: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 50%, #11998e 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            color: #11998e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .nav-btn.settings {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
        }

        /* Floating animals background */
        .bg-animal {
            position: fixed;
            font-size: 3rem;
            opacity: 0.15;
            animation: floatAnimal 8s ease-in-out infinite;
            z-index: 1;
        }

        .bg-animal:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .bg-animal:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .bg-animal:nth-child(3) { bottom: 30%; left: 8%; animation-delay: 2s; }
        .bg-animal:nth-child(4) { bottom: 20%; right: 5%; animation-delay: 3s; }

        @keyframes floatAnimal {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .game-container {
            width: 95%;
            max-width: 1000px;
            padding: 80px 10px 10px;
            z-index: 10;
        }

        .main-panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(240,255,240,0.98) 100%);
            border-radius: 40px;
            padding: 30px;
            border: 5px solid #38ef7d;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.3),
                inset 0 0 60px rgba(56, 239, 125, 0.1);
            text-align: center;
            position: relative;
        }

        .main-panel::before {
            content: '🦁 🐯 🐻 🐨';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            background: white;
            padding: 5px 20px;
            border-radius: 30px;
            border: 3px solid #38ef7d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            margin: 20px 0 0;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 50%, #11998e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #666;
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
            background: rgba(0,0,0,0.05);
            border-radius: 20px;
            padding: 8px;
        }

        .progress-bar-wrapper {
            background: #e0e0e0;
            border-radius: 15px;
            height: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
            border-radius: 15px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            font-weight: 900;
            color: #11998e;
            font-size: 1.1rem;
            margin-top: 8px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 30px;
            border: 4px dashed #00b894;
        }

        @media (min-width: 600px) {
            .cards-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .target-card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #fff 0%, #f5f5f5 100%);
            border: 4px dashed #74b9ff;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .target-card.drag-over {
            background: linear-gradient(145deg, #e3f2fd 0%, #bbdefb 100%);
            border-color: #2196F3;
            transform: scale(1.05);
        }

        .target-card.matched {
            border-style: solid;
            background: linear-gradient(145deg, #55efc4 0%, #00b894 100%);
            border-color: #00b894;
            animation: pulse 0.5s ease;
            box-shadow: 0 10px 30px rgba(0, 184, 148, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .animal-emoji {
            font-size: 4rem;
            filter: grayscale(100%);
            opacity: 0.3;
            transition: all 0.5s;
        }

        .target-card.matched .animal-emoji {
            filter: grayscale(0%);
            opacity: 1;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .animal-name {
            position: absolute;
            bottom: 8px;
            font-size: 0.8rem;
            color: #2d3436;
            font-weight: 800;
            background: rgba(255,255,255,0.9);
            padding: 4px 12px;
            border-radius: 12px;
        }

        .cards-area {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 30px;
            border: 3px solid #e17055;
            min-height: 110px;
        }

        .animal-card {
            width: 85px;
            height: 85px;
            background: linear-gradient(145deg, #fff 0%, #f8f9fa 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            border: 3px solid #00b894;
            transition: all 0.3s;
            font-size: 3rem;
        }

        .animal-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
        }

        .animal-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .animal-card.matched {
            visibility: hidden;
            pointer-events: none;
        }

        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 2px;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 15px 35px rgba(17, 153, 142, 0.4);
        }

        .btn:hover { 
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 20px 40px rgba(17, 153, 142, 0.5);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: linear-gradient(145deg, #fff 0%, #e8f8f5 50%, #d1f2eb 100%);
            padding: 50px;
            border-radius: 45px;
            text-align: center;
            border: 5px solid #38ef7d;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: modalPop 0.5s ease;
        }

        .modal-card.lose {
            border-color: #e74c3c;
            background: linear-gradient(145deg, #fff 0%, #fdf2f2 50%, #ffeaea 100%);
        }

        @keyframes modalPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .modal.show { display: flex; }

        .sound-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: all 0.3s;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
        }

        .sound-toggle.muted {
            opacity: 0.5;
        }

        /* Shake animation for wrong match */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav-bar">
        <a href="/" class="nav-btn">
            🏠 Bosh sahifa
        </a>
        <a href="/settings/" class="nav-btn settings">
            ⚙️ Sozlamalar
        </a>
    </div>

    <!-- Background floating animals -->
    <div class="bg-animal">🦁</div>
    <div class="bg-animal">🐯</div>
    <div class="bg-animal">🐻</div>
    <div class="bg-animal">🐨</div>

    <div class="game-container">
        <div class="main-panel">
            <h1>🐾 HAYVONLAR 🐾</h1>
            <p class="subtitle">Hayvonlarni qo'lga olib, ularning uyasiga olib boring!</p>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">Juftlashtirilgan: 0 / 4</div>
            </div>

            <div id="targetGrid" class="cards-grid"></div>
            <div id="cardsArea" class="cards-area"></div>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-card" id="modalCard">
            <!-- Content will be set by JavaScript -->
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

    <script>
        // Animals data
        const ALL_ANIMALS = {
            sher: { name: "Sher", emoji: "🦁" },
            yulbars: { name: "Yulbars", emoji: "🐯" },
            ayiq: { name: "Ayiq", emoji: "🐻" },
            koala: { name: "Koala", emoji: "🐨" },
            fil: { name: "Fil", emoji: "🐘" },
            zyrafa: { name: "Zebra", emoji: "🦓" },
            maymun: { name: "Maymun", emoji: "🐵" },
            pingvin: { name: "Pingvin", emoji: "🐧" }
        };

        let currentRoundKeys = [];
        let matches = 0;
        let gameOver = false;
        let draggedKey = null;
        let score = 0;
        const ANIMALS_PER_ROUND = 4;
        let soundEnabled = true;

        // Sound effects using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (!soundEnabled) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            if (type === 'correct') {
                // Happy sound
                oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } else if (type === 'wrong') {
                // Sad sound
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.linearRampToValueAtTime(150, audioContext.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } else if (type === 'win') {
                // Victory melody
                const notes = [523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.15);
                    gain.gain.setValueAtTime(0.3, audioContext.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.15 + 0.3);
                    osc.start(audioContext.currentTime + i * 0.15);
                    osc.stop(audioContext.currentTime + i * 0.15 + 0.3);
                });
            }
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').innerText = soundEnabled ? '🔊' : '🔇';
            document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
            localStorage.setItem('soundEnabled', soundEnabled);
        }

        function loadSettings() {
            const saved = localStorage.getItem('soundEnabled');
            if (saved !== null) {
                soundEnabled = saved === 'true';
                document.getElementById('soundToggle').innerText = soundEnabled ? '🔊' : '🔇';
                document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
            }
        }

        function initGame() {
            matches = 0;
            score = 0;
            gameOver = false;
            nextLevel();
        }

        function nextLevel() {
            matches = 0;
            gameOver = false;
            const keys = Object.keys(ALL_ANIMALS);
            currentRoundKeys = keys.sort(() => 0.5 - Math.random()).slice(0, ANIMALS_PER_ROUND);
            updateProgress();
            render();
        }

        function updateProgress() {
            const percent = (matches / ANIMALS_PER_ROUND) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = `Yutuqlar: ${score} | Juftlashtirilgan: ${matches} / ${ANIMALS_PER_ROUND}`;
        }

        function render() {
            const grid = document.getElementById('targetGrid');
            const cardsArea = document.getElementById('cardsArea');

            // Render target zones
            grid.innerHTML = currentRoundKeys.map(key => `
                <div class="target-card" id="target-${key}" data-key="${key}"
                     ondragover="handleDragOver(event)" 
                     ondragleave="handleDragLeave(event)" 
                     ondrop="handleDrop(event, '${key}')">
                    <div class="animal-emoji">${ALL_ANIMALS[key].emoji}</div>
                    <div class="animal-name">${ALL_ANIMALS[key].name}</div>
                </div>
            `).join('');

            // Render animal cards (shuffled)
            const shuffledKeys = [...currentRoundKeys].sort(() => 0.5 - Math.random());
            cardsArea.innerHTML = shuffledKeys.map(key => `
                <div class="animal-card" id="card-${key}" data-key="${key}" draggable="true"
                     ondragstart="handleDragStart(event, '${key}')" 
                     ondragend="handleDragEnd(event)">
                    ${ALL_ANIMALS[key].emoji}
                </div>
            `).join('');
        }

        function handleDragStart(e, key) {
            if (gameOver) return;
            draggedKey = key;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedKey = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e, targetKey) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            if (gameOver || !draggedKey) return;

            const targetEl = document.getElementById(`target-${targetKey}`);
            const cardEl = document.getElementById(`card-${draggedKey}`);

            if (draggedKey === targetKey && !targetEl.classList.contains('matched')) {
                // Correct match!
                playSound('correct');
                targetEl.classList.add('matched');
                cardEl.classList.add('matched');
                matches++;
                updateProgress();

                // Confetti
                confetti({
                    particleCount: 80,
                    spread: 60,
                    origin: { y: 0.8 },
                    colors: ['#00b894', '#55efc4', '#ffeaa7', '#fab1a0']
                });

                if (matches === ANIMALS_PER_ROUND) {
                    // Round complete - WIN
                    score++;
                    updateProgress();
                    gameOver = true;
                    playSound('win');
                    setTimeout(() => showWinModal(), 600);
                }
            } else {
                // Wrong match - GAME OVER immediately!
                playSound('wrong');
                
                // Shake animation
                cardEl.classList.add('shake');
                targetEl.classList.add('shake');
                
                setTimeout(() => {
                    cardEl.classList.remove('shake');
                    targetEl.classList.remove('shake');
                    gameOver = true;
                    showLoseModal();
                }, 500);
            }
        }

        function showWinModal() {
            const m = document.getElementById('gameModal');
            const card = document.getElementById('modalCard');
            
            card.innerHTML = `
                <div id="modalIcon" style="font-size: 5rem; margin-bottom: 15px;">🌟🏆</div>
                <h2 id="modalTitle" style="margin: 0; font-size: 2.2rem; font-weight: 800; color: #00b894;">BARAKALLA!</h2>
                <p id="modalMsg" style="color: #555; margin: 15px 0 25px; font-size: 1.2rem;">Yutuqlar: ${score}</p>
                
                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <button class="btn" onclick="nextRound()" style="background: linear-gradient(135deg, #00b894, #38ef7d);">➡️ Keyingisi</button>
                    <button class="btn" onclick="finishGame()" style="background: linear-gradient(135deg, #e74c3c, #e67e22);">🏁 Tugatish</button>
                </div>
            `;
            
            // Big confetti
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#11998e', '#38ef7d', '#00b894', '#55efc4', '#ffeaa7']
            });
            
            m.classList.add('show');
        }

        function showLoseModal() {
            const m = document.getElementById('gameModal');
            const card = document.getElementById('modalCard');
            
            card.innerHTML = `
                <div id="modalIcon" style="font-size: 5rem; margin-bottom: 15px;">😢💔</div>
                <h2 id="modalTitle" style="margin: 0; font-size: 2.2rem; font-weight: 800; color: #e74c3c;">OY, MAG'LUBIYAT!</h2>
                <p id="modalMsg" style="color: #555; margin: 15px 0 25px; font-size: 1.2rem;">Bitta xato! Qayta urinib ko'ring!</p>
                <button class="btn" onclick="initGame()" style="background: linear-gradient(135deg, #3498db, #9b59b6);">🔄 Qayta urinish</button>
            `;
            
            m.classList.add('show');
        }

        function nextRound() {
            document.getElementById('gameModal').classList.remove('show');
            nextLevel();
        }

        function finishGame() {
            document.getElementById('gameModal').classList.remove('show');
            const m = document.getElementById('gameModal');
            const card = document.getElementById('modalCard');
            
            card.innerHTML = `
                <div style="font-size: 5rem; margin-bottom: 15px;">🏆</div>
                <h2 style="margin: 0; font-size: 2.2rem; font-weight: 800; color: #e67e22;">O'YIN TUGADI!</h2>
                <p style="color: #555; margin: 15px 0 25px; font-size: 1.2rem;">Umumiy yutuqlaringiz: ${score}</p>
                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <button class="btn" onclick="initGame()" style="background: linear-gradient(135deg, #00b894, #38ef7d);">🎮 Yangi o'yin</button>
                    <a href="/" class="btn" style="background: linear-gradient(135deg, #3498db, #9b59b6); text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">🏠 Bosh sahifa</a>
                </div>
            `;
            m.classList.add('show');
        }

        function closeModal() {
            document.getElementById('gameModal').classList.remove('show');
        }

        window.onload = () => {
            loadSettings();
            initGame();
        };
    </script>
</body>
</html>
