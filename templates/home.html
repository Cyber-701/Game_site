<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sehrli O'yinlar Dunyosi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3D68;
            --secondary: #42D1F0;
            --accent: #FFD32D;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: #1a1a2e;
            color: white;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, #3d2b56 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #2b3d56 0%, transparent 40%);
        }

        .bungee-font { font-family: 'Bungee', cursive; }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--secondary);
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(66, 209, 240, 0.3);
        }

        .btn-play {
            background: linear-gradient(45deg, var(--primary), #ff7597);
            box-shadow: 0 8px 0 #b82244;
            transition: all 0.1s;
        }

        .btn-play:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b82244;
        }

        .bounce-in {
            animation: bounceIn 1s both;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .floating-icon {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">

    <!-- Orqa fondagi yulduzchalar -->
    <div id="stars-container"></div>

    <!-- Markaziy sarlavha -->
    <div class="text-center z-10 mb-16 bounce-in">
        <h1 class="bungee-font text-6xl md:text-8xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-pink-500 to-yellow-400 mb-6 filter drop-shadow-lg">
            KOSMOS O'YINLARI
        </h1>
        <div class="flex items-center justify-center gap-4">
            <span class="h-1 w-12 bg-cyan-400 rounded-full"></span>
            <p class="text-xl md:text-2xl font-bold uppercase tracking-widest text-cyan-200">Kashfiyotlarni boshla!</p>
            <span class="h-1 w-12 bg-cyan-400 rounded-full"></span>
        </div>
    </div>

    <!-- O'yin kartalari -->
    <div class="px-6 max-w-6xl w-full z-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        
            <!-- Game 1: Shakllar -->
            <a href="/game1/" class="block">
                <div class="glass-card p-8 rounded-[40px] text-center group cursor-pointer h-full flex flex-col">
                    <div class="mb-6 relative h-32 flex items-center justify-center">
                        <div class="absolute inset-0 bg-purple-500/20 rounded-full blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="text-7xl floating-icon">🎨</div>
                    </div>
                    <h2 class="bungee-font text-3xl text-purple-400 mb-3">SHAKLLAR</h2>
                    <p class="text-base text-gray-300 mb-6 leading-relaxed flex-grow">Rangli shakllarni uychasiga joyla! Aqlingni sinab ko'r!</p>
                    <button class="btn-play w-full py-4 rounded-2xl text-xl font-black tracking-widest text-white bungee-font bg-gradient-to-r from-purple-500 to-pink-500 shadow-[0_8px_0_#9333ea] active:shadow-[0_4px_0_#9333ea] active:translate-y-1 transition-all" onclick="event.preventDefault(); window.location.href='/game1/';">
                        O'YNASH
                    </button>
                </div>
            </a>

            <!-- Game 2: Hayvonlar -->
            <a href="/game2/" class="block">
                <div class="glass-card p-8 rounded-[40px] text-center group cursor-pointer h-full flex flex-col border-green-400/50">
                    <div class="mb-6 relative h-32 flex items-center justify-center">
                        <div class="absolute inset-0 bg-green-500/20 rounded-full blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="text-7xl floating-icon">🦁</div>
                    </div>
                    <h2 class="bungee-font text-3xl text-green-400 mb-3">HAYVONLAR</h2>
                    <p class="text-base text-gray-300 mb-6 leading-relaxed flex-grow">Hayvonlarni juftlashtir! Eslab qol va tezlikni oshir!</p>
                    <button class="btn-play w-full py-4 rounded-2xl text-xl font-black tracking-widest text-white bungee-font bg-gradient-to-r from-green-500 to-teal-500 shadow-[0_8px_0_#059669] active:shadow-[0_4px_0_#059669] active:translate-y-1 transition-all" onclick="event.preventDefault(); window.location.href='/game2/';">
                        O'YNASH
                    </button>
                </div>
            </a>

            <!-- Game 3: Sehrli Daraxt -->
            <a href="/game3/" class="block">
                <div class="glass-card p-8 rounded-[40px] text-center group cursor-pointer h-full flex flex-col border-orange-400/50">
                    <div class="mb-6 relative h-32 flex items-center justify-center">
                        <div class="absolute inset-0 bg-orange-500/20 rounded-full blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="text-7xl floating-icon">🌳</div>
                    </div>
                    <h2 class="bungee-font text-3xl text-orange-400 mb-3">DARAXT</h2>
                    <p class="text-base text-gray-300 mb-6 leading-relaxed flex-grow">Raqamlarni top va daraxtni gullat! 5 ta savol!</p>
                    <button class="btn-play w-full py-4 rounded-2xl text-xl font-black tracking-widest text-white bungee-font bg-gradient-to-r from-orange-500 to-yellow-500 shadow-[0_8px_0_#d97706] active:shadow-[0_4px_0_#d97706] active:translate-y-1 transition-all" onclick="event.preventDefault(); window.location.href='/game3/';">
                        O'YNASH
                    </button>
                </div>
            </a>

        </div>
    </div>

    <!-- Chetdagi bezak hayvonlar -->
    <div class="fixed top-10 left-10 text-6xl floating-icon opacity-80">🦁</div>
    <div class="fixed top-10 right-10 text-6xl floating-icon opacity-80" style="animation-delay: -1s;">🐯</div>
    <div class="fixed bottom-10 left-10 text-6xl floating-icon opacity-80" style="animation-delay: -2s;">🐻</div>
    <div class="fixed bottom-10 right-10 text-6xl floating-icon opacity-80" style="animation-delay: -3s;">🐨</div>
    
    <!-- Qo'shimcha bezaklar -->
    <div class="fixed top-1/4 left-5 text-4xl floating-icon opacity-60" style="animation-delay: -0.5s;">⭐</div>
    <div class="fixed top-1/3 right-8 text-4xl floating-icon opacity-60" style="animation-delay: -1.5s;">✨</div>
    <div class="fixed bottom-1/3 left-8 text-4xl floating-icon opacity-60" style="animation-delay: -2.5s;">🌟</div>
    <div class="fixed bottom-1/4 right-5 text-4xl floating-icon opacity-60" style="animation-delay: -3.5s;">💫</div>

    <script>
        // Yulduzchalarni yaratish
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            container.appendChild(star);
        }
    </script>

</body>
</html>
